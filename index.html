<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Measure — Coming Soon</title>
  <meta name="description" content="A new creative workspace, coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --charcoal: #1a1a1a;
      --cream: #f0ebe3;
      --yellow: #f5e642;
      --mid: #2e2e2e;
      --muted: #6b6b6b;
    }

    html, body {
      height: 100%;
      background: var(--charcoal);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 48px;
      position: relative;
      z-index: 1;
      max-width: 960px;
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(42px, 7vw, 88px);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: var(--cream);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.25s;
    }

    h1 span {
      color: var(--yellow);
    }

    .tagline {
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.65;
      color: var(--muted);
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--yellow);
      margin: 48px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.55s;
    }

    .status {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.7s;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 2s ease-in-out infinite;
    }

    footer {
      padding: 32px 48px;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--mid);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.9s;
    }

    .footer-left {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .footer-right a {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s ease;
    }

    .footer-right a:hover {
      color: var(--cream);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      main   { padding: 60px 28px; }
      footer { padding: 28px 28px; flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Make Measure</p>
    <h1>Make + <span>Measure.</span></h1>
    <p class="tagline">A new creative workspace, coming soon.</p>
    <div class="divider"></div>
    <p class="status">
      <span class="status-dot"></span>
      Currently in development
    </p>
  </main>
  <footer>
    <span class="footer-left">© 2026 Make Measure</span>
    <div class="footer-right">
      <a href="/privacy.html">Privacy Policy</a>
    </div>
  </footer>
</body>
</html>
